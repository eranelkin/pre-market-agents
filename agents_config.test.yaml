providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com
    supports_tool_use: true
    supports_built_in_search: false
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    supports_tool_use: true
    supports_built_in_search: false
  google:
    api_key_env: GOOGLE_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    supports_tool_use: true
    supports_built_in_search: true
  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    supports_tool_use: false
    supports_built_in_search: false
model_variants:
- id: claude_sonnet
  label: Claude Sonnet 4.6
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 4096
- id: gpt4o
  label: GPT-4o
  provider: openai
  model: gpt-4o
  max_tokens: 4096
- id: gemini_flash
  label: Gemini 1.5 Flash (free tier)
  provider: google
  model: gemini-1.5-flash
  max_tokens: 4096
- id: llama_groq
  label: Llama 3.1 70B via Groq (free tier)
  provider: groq
  model: llama-3.1-70b-versatile
  max_tokens: 4096
- id: llama_3_3_70b
  label: LLaMA 3.3 70B (Groq)
  provider: groq
  model: llama-3.3-70b-versatile
  max_tokens: 4096
- id: gemini_2_flash
  label: Gemini 2.0 Flash (Google)
  provider: google
  model: gemini-2.0-flash-exp
  max_tokens: 4096
agents:
  orchestrator:
    is_system: true
    weight: 0.0
    active: true
    prompt_file: prompts/test/technical_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  technical:
    is_system: false
    weight: 0.3
    active: true
    prompt_file: prompts/test/technical_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  fundamental:
    is_system: false
    weight: 0.25
    active: false
    prompt_file: prompts/test/fundamental_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  sentiment:
    is_system: false
    weight: 0.2
    active: false
    prompt_file: prompts/test/sentiment_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  risk:
    is_system: false
    weight: 0.15
    active: false
    prompt_file: prompts/test/risk_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  macro:
    is_system: false
    weight: 0.1
    active: false
    prompt_file: prompts/test/macro_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 500
    timeout_seconds: 30
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  ceo:
    is_system: true
    weight: 0.0
    active: true
    prompt_file: prompts/test/ceo_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 1000
    timeout_seconds: 60
    enable_web_search: false
    enable_deep_search: false
    parent: null
    child_weight: null
  momtest:
    is_system: false
    weight: 0.0
    active: true
    prompt_file: prompts/test/momtest_prompt.md
    default_variant: llama_3_3_70b
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: false
    enable_deep_search: false
