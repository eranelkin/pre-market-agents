    child_weight: null
pipeline:
  ceo_autonomous: false
  chunk_size: 2
  active_variants:
  - llama_3_3_70b
  compare_when_multiple: true
search:
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
