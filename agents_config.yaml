providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com
    supports_tool_use: true
    supports_built_in_search: false
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    supports_tool_use: true
    supports_built_in_search: false
  google:
    api_key_env: GOOGLE_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    supports_tool_use: true
    supports_built_in_search: true
  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    supports_tool_use: false
    supports_built_in_search: false
model_variants:
- id: claude_sonnet
  label: Claude Sonnet 4.6
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 4096
- id: gpt4o
  label: GPT-4o
  provider: openai
  model: gpt-4o
  max_tokens: 4096
- id: gemini_flash
  label: Gemini 1.5 Flash (free tier)
  provider: google
  model: gemini-1.5-flash
  max_tokens: 4096
- id: llama_groq
  label: Llama 3.1 70B via Groq (free tier)
  provider: groq
  model: llama-3.1-70b-versatile
  max_tokens: 4096
agents:
  technical:
    weight: 0.30
    prompt_file: prompts/technical_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: false
    enable_deep_search: false
  fundamental:
    weight: 0.25
    prompt_file: prompts/fundamental_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: false
    enable_deep_search: false
  sentiment:
    weight: 0.20
    prompt_file: prompts/sentiment_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: true
    enable_deep_search: false
  risk:
    weight: 0.15
    prompt_file: prompts/risk_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: false
    enable_deep_search: false
  macro:
    weight: 0.10
    prompt_file: prompts/macro_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 2000
    timeout_seconds: 45
    enable_web_search: true
    enable_deep_search: false
  ceo:
    weight: 0.0
    prompt_file: prompts/ceo_prompt.md
    default_variant: claude_sonnet
    fallback_variant: gemini_flash
    max_tokens: 8000
    timeout_seconds: 120
    enable_web_search: false
    enable_deep_search: false
pipeline:
  chunk_size: 5
  active_variants:
  - llama_groq
  compare_when_multiple: true
search:
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
